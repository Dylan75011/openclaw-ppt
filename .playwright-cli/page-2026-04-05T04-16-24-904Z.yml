      - textbox [ref=e606]:
        - heading "「追光·夜拍」沉浸式夜景人像体验展" [level=1] [ref=e607]
        - paragraph [ref=e608]:
          - strong [ref=e609]: 我们判断：这场活动值得做的原因很简单——手机夜景人像是个「参数越强，感知越弱」的功能。用户永远搞不懂「5000万超感光」意味着什么，但他们一定知道「晚上拍照黑不黑、噪点多不多」。我们的策略就是让用户自己在暗光环境里拍一次，对比一次，然后「看见」产品力。
        - paragraph [ref=e610]: "---"
        - heading "核心策略：把「参数信任」变成「感官信任」" [level=2] [ref=e611]
        - paragraph [ref=e612]: 我们不卖参数，卖的是「我能把你拍好看」的确定性。
        - paragraph [ref=e613]: 对于中高端手机品牌，影像功能，尤其是夜景人像，是最重要的购买决策因素之一。但夜景拍摄的参数——光圈大小、感光度、算法优化——对普通消费者来说是完全抽象的。他们看过太多「发布会样张」，对「随手一拍就是大片」这句话早就免疫了。
        - paragraph [ref=e614]:
          - strong [ref=e615]: 所以我们不做发布会，要做一个「产品力沉浸展」。核心逻辑是三句话：
        - list [ref=e616]:
          - listitem [ref=e617]:
            - paragraph [ref=e618]:
              - strong [ref=e619]: 用场景替代说明
              - text: ：不告诉用户我们的夜景模式多强，而是把他放进一个「他的手机肯定拍不好」的环境里，让他自己发现问题。
          - listitem [ref=e620]:
            - paragraph [ref=e621]:
              - strong [ref=e622]: 用对比替代说服
              - text: ：不靠导购推荐，而是让用户在屏幕上亲眼看见竞品和自己的差距。
          - listitem [ref=e623]:
            - paragraph [ref=e624]:
              - strong [ref=e625]: 用出片替代告知
              - text: ：不展示样张，而是让用户带着自己拍的高质量照片离开——这才是最有说服力的产品口碑。
        - paragraph [ref=e626]:
          - strong [ref=e627]: 我们的目标人群很清晰：22-35岁的年轻消费者，对手机摄影有需求，但对参数无感。他们要的是「我随手一拍能发朋友圈」的结果。
        - paragraph [ref=e628]: "---"
        - heading "空间与体验设计：「追光」动线的心理学逻辑" [level=2] [ref=e629]
        - paragraph [ref=e630]:
          - strong [ref=e631]: 我们设计的是一个30-40米动线的完整叙事：入口制造期待→暗光区制造焦虑→光影棚提供解决方案→对比屏完成说服→收尾区给出奖励。整个空间从亮到暗再回到亮，节奏感本身就是一种体验。
        - heading "空间规划概要" [level=3] [ref=e632]
        - paragraph [ref=e633]: 区域面积占比核心功能停留时长入口光影装置10%视觉悬念+引导打卡1-2分钟暗光实验室25%城市夜景场景+难度设置3-5分钟光影人像棚35%3种光效场景+摄影师驻场8-12分钟对比互动屏15%实时对比+社交分享3-4分钟收尾区15%照片打印+周边领取2-3分钟
        - heading "五大分区设计逻辑" [level=3] [ref=e634]
        - paragraph [ref=e635]:
          - strong [ref=e636]: 入口光影装置：我们不追求网红墙的视觉冲击，而是用光线引导。
          - text: 一面「追光」主题的光影墙配合Slogan，用引导性灯光指向体验入口。目的不是拍照打卡，而是制造「里面有什么」的悬念感。
        - paragraph [ref=e637]:
          - strong [ref=e638]: 暗光实验室：这是整个活动的「钩子」，核心是「让普通手机失效」。
          - text: 我们模拟城市夜景的暗光环境，亮度控制在50lux以下——相当于深夜街头的光照水平。用户在这样的环境里用自己的手机拍摄，会发现噪点多、面部黑、背景糊。这就是我们要的「被难住」时刻。
          - strong [ref=e639]: 当用户意识到自己手机拍不好的时候，产品出场的价值才被感知。
        - paragraph [ref=e640]:
          - strong [ref=e641]: 光影人像棚：这是用户「被拯救」的区域，也是产出社交素材的核心阵地。
          - text: 我们设置三个主题场景：
        - list [ref=e642]:
          - listitem [ref=e643]:
            - paragraph [ref=e644]:
              - strong [ref=e645]: 城市霓虹
              - text: ：冷色调高对比，还原都市夜晚的标志性光影
          - listitem [ref=e646]:
            - paragraph [ref=e647]:
              - strong [ref=e648]: 星空蓝调
              - text: ：低对比柔光，制造梦幻感的蓝紫色调
          - listitem [ref=e649]:
            - paragraph [ref=e650]:
              - strong [ref=e651]: 落日逆光
              - text: ：强光比轮廓光，模拟黄昏时分的戏剧性光效
        - paragraph [ref=e652]:
          - text: 每个场景都配备专业补光设备，但用户只需要用手机拍摄。我们安排专业人像摄影师驻场指导摆姿和用光——
          - strong [ref=e653]: 这相当于为每个用户提供了「免费的人像摄影师」服务，这是极强的体验增值，也是用户愿意主动传播的核心素材。
        - paragraph [ref=e654]:
          - strong [ref=e655]: 对比互动屏：这是「临门一脚」的成交说服环节。
          - text: 屏幕分屏显示：左边竞品默认模式拍摄，右边本机夜景人像模式拍摄。用户可以自己切换对比场景，实时感受产品力的差距。
          - strong [ref=e656]: 视觉对比比任何参数都有说服力——尤其当左边的照片是自己的手机拍的时候。
        - paragraph [ref=e657]:
          - strong [ref=e658]: 收尾区：这是用户带着「战利品」离开的最后一环。
          - text: 打印用户拍摄的最佳照片，配合品牌定制周边（手机壳/帆布包等）。用「带走你的夜」作为传播slogan——这个动作本身就制造了社交素材。
        - paragraph [ref=e659]: "---"
        - heading "玩法与传播设计：用户不是因为活动而来，是因为「能出片」而来" [level=2] [ref=e660]
        - paragraph [ref=e661]:
          - strong [ref=e662]: 我们设计的传播逻辑是：用户发的是「我的夜景人像照片」，而不是「这个活动好酷」。这是两个级别的传播量级——前者是炫耀个人成果，后者是给活动做广告。
        - heading "打卡机制设计" [level=3] [ref=e663]
        - paragraph [ref=e664]:
          - text: 全程设置五个区域的打卡点，集齐印章兑换照片打印和品牌周边。这个机制确保用户不会中途离开——
          - strong [ref=e665]: 我们卖的不是强制逛完的KPI，而是「完整打卡才能拿到最好看的照片」这个心理。
        - heading "社交传播设计" [level=3] [ref=e666]
        - paragraph [ref=e667]:
          - strong [ref=e668]: 核心传播素材是用户自己拍出的照片，而非活动本身。
          - text: 在光影人像棚的场景设计、摄影师的专业度、打印照片的质感这三个环节必须精品化——照片质量决定了用户愿不愿意发朋友圈。
        - paragraph [ref=e669]:
          - text: 互动屏区域设置扫码分享功能，用户对比完可以直接保存对比图发朋友圈。
          - strong [ref=e670]: "话题天然具备讨论性：#原来我的手机夜景这么差# #新品夜景人像对比#。"
        - paragraph [ref=e671]: "---"
        - heading "执行计划：节奏清晰，责任到人" [level=2] [ref=e672]
        - paragraph [ref=e673]: 阶段时间节点核心任务筹备期T-30至T-15方案确认、商场签约、供应商招标、搭建方案细化搭建期T-3至T-2空间搭建、灯光调试、设备安装、暗光场景效果确认预演期T-1全流程彩排、人员培训、应急预案确认、物料最后检查执行期T至T+4活动正式运营，共5天复盘期T+5至T+10数据复盘、传播效果评估、用户反馈整理
        - paragraph [ref=e674]:
          - strong [ref=e675]: 我们建议执行期选在周末+工作日组合，确保覆盖不同人群。T日建议选在周五晚间开始，承接周末人流高峰。
        - paragraph [ref=e676]: "---"
        - heading "预算分配：资源向体验和传播倾斜" [level=2] [ref=e677]
        - paragraph [ref=e678]: 科目占比说明场地租赁及搭建**40%**商场中庭快闪核心成本，含5天场地、基础搭建、灯光音响专业设备租赁**20%**暗光场景补光灯、对比互动屏、相机+打印机等人工及驻场团队**15%**3-4人驻场团队（含1名专业人像摄影师）、管理人员物料及周边**10%**打卡物料、照片打印相纸、品牌周边礼品传播及运营**10%**KOL体验邀请、社交媒体投放、活动话题运营应急及管理**5%**备用金、临时增援、不可预见费用
        - paragraph [ref=e679]:
          - strong [ref=e680]: 我们优先保障的是体验品质（场地搭建+设备）和传播素材（摄影师+打印）——这两个环节直接影响用户感知和二次传播效果。
        - paragraph [ref=e681]: "---"
        - heading "预期效果：KPI是结果，不是目标" [level=2] [ref=e682]
        - paragraph [ref=e683]: 指标目标值说明到店体验人数**3000-5000人**5天总计，按商场中庭常规人流转化率估算照片打印/领取率**60%以上**到店用户中至少6成完成完整打卡并领取照片社交媒体自发分享量**800-1200条**按到店人数的20-30%估算，检验「出片」体验是否达标留资/注册数量**1500-2500人**扫码参与互动时的留资，为新品上市蓄水媒体/KOL报道数量**10-15篇**通过邀请和自发报道产生外部声量
        - paragraph [ref=e684]:
          - strong [ref=e685]: 我们认为这些数字是「可检验的预期」，而非「必须达标的压力」。如果到店人数只有2000人，但社交分享率达到40%，说明体验设计是成功的——质量比数量重要。
        - paragraph [ref=e686]: "---"
        - heading "风险与应对：我们能想到的问题，都已有预案" [level=2] [ref=e687]
        - paragraph [ref=e688]:
          - strong [ref=e689]: 最大的风险不是活动本身，而是高峰期排队超过15分钟导致的用户体验下降。
          - text: 暗光环境下同一时间能容纳的人数有限，这是物理限制。我们有三层应对：
        - paragraph [ref=e690]: 1. 等候区设置互动内容（品牌故事墙、产品功能演示视频），让排队时间不无聊
        - paragraph [ref=e691]: 2. 开放提前预约通道控制时段人流，减少现场排队压力
        - paragraph [ref=e692]: 3. 高峰期放慢入场节奏但保证体验时长——宁可少接待用户，也要保证每个人体验完整
        - paragraph [ref=e693]:
          - strong [ref=e694]: 其他可预见的风险：
        - list [ref=e695]:
          - listitem [ref=e696]:
            - paragraph [ref=e697]:
              - strong [ref=e698]: 暗光场景下手机对焦不稳定
              - text: ：现场提供手机支架/稳定器，驻场人员指导拍摄技巧，确保夜景模式正常触发
          - listitem [ref=e699]:
            - paragraph [ref=e700]:
              - strong [ref=e701]: 照片打印机故障
              - text: ：现场配置2台打印机（一主一备），提前进行压力测试，准备足量相纸和墨盒，打印前让用户确认照片
          - listitem [ref=e702]:
            - paragraph [ref=e703]:
              - strong [ref=e704]: 商场消防安全检查
              - text: ：搭建材料全部使用B1级阻燃材料，提前与商场物业沟通确认报审
          - listitem [ref=e705]:
            - paragraph [ref=e706]:
              - strong [ref=e707]: 天气因素
              - text: ：提前确认商场场地条件，如为半户外需准备雨棚方案
        - paragraph [ref=e708]: "---"
        - heading "结论：这场活动「怎么做到」的答案" [level=2] [ref=e709]
        - paragraph [ref=e710]: 我们总结一下核心要点：
        - paragraph [ref=e711]:
          - text: "1."
          - strong [ref=e712]: 定位清晰
          - text: ：不是参数发布会，是「产品力沉浸展」，让用户在暗光场景里自己发现产品价值
        - paragraph [ref=e713]:
          - text: "2."
          - strong [ref=e714]: 动线精心设计
          - text: ：从亮到暗再到亮的节奏，制造「被难住→被拯救→被说服」的情绪转折
        - paragraph [ref=e715]:
          - text: "3."
          - strong [ref=e716]: 体验必须精品化
          - text: ：暗光实验室、光影人像棚、对比互动屏、照片打印——每个触点都要经得起用户挑刺
        - paragraph [ref=e717]:
          - text: "4."
          - strong [ref=e718]: 传播素材优先
          - text: ：用户拍出的照片才是社交货币，不是活动本身的视觉设计
        - paragraph [ref=e719]:
          - text: "5."
          - strong [ref=e720]: 风险前置预案
          - text: ：排队体验和打印环节是两大命门，必须有Plan B
        - paragraph [ref=e721]:
          - strong [ref=e722]: 如果决策层问「这场活动能带来什么」，我们的答案是：3000-5000个到店用户亲自感知产品夜景人像能力，800-1200条用户自发传播的高质量社交素材，以及1500-2500个留资的新品潜客。这些是发布会做不到的——参数说服不了的用户，沉浸式体验可以。