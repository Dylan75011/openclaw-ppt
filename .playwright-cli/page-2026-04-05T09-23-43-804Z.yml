      - textbox [ref=e635]:
        - heading "问界新车型暗光人像实验室快闪活动策划方案" [level=1] [ref=e636]
        - heading "方案核心结论" [level=2] [ref=e637]
        - paragraph [ref=e638]:
          - strong [ref=e639]: 我们判断：这是问界新品上市期间最具转化潜力的线下体验方案。
        - paragraph [ref=e640]:
          - text: 在50-80万预算约束下，这个方案能在5天内完成三个核心目标：
          - strong [ref=e641]: 3000-5000人现场体验、60%以上到店转化率、2000+条自然社交传播
          - text: 。核心逻辑不是做一个漂亮的网红打卡点，而是让用户在真实暗光环境中对比体验新品拍照能力——用出片效果说服用户，而非用话术说服用户。
        - paragraph [ref=e642]: "---"
        - heading "一、策略洞察：为什么这个方案值得做" [level=2] [ref=e643]
        - heading "1.1 核心挑战：如何在商场中庭让人真正感受到新品拍照能力？" [level=3] [ref=e644]
        - paragraph [ref=e645]: 商场中庭是寸土寸金的空间，但环境复杂、光线不可控。普通快闪的做法是做一个漂亮的打卡点让人拍照发朋友圈，但这对汽车这种高卷入度产品远远不够。用户可以为了一个好看的背景去网红咖啡馆打卡，但不会因为一个漂亮的快闪就买一台20万的车。
        - paragraph [ref=e646]:
          - text: 我们的洞察是：
          - strong [ref=e647]: 用户需要被"说服"，而不是被"邀请"。
        - heading "1.2 策略定位：把快闪做成\"实验室\"，而非\"打卡点\"" [level=3] [ref=e648]
        - paragraph [ref=e649]: "\"实验室\"三个字本身就是专业感的表达，比\"体验馆\"\"打卡点\"更有说服力，也规避了网红感的陷阱。"
        - paragraph [ref=e650]: 核心策略不是展示新品，而是让用户体验新品在真实暗光场景中的拍照能力。用户在现场的对比体验+现场出片，会形成强烈的"这就是我想要的感觉"——这才是驱动到店甚至下单的关键。
        - paragraph [ref=e651]:
          - strong [ref=e652]: 快闪是前站，目标是引流到店形成完整体验闭环。
        - paragraph [ref=e653]: "---"
        - heading "二、活动创意：暗光影像实验室" [level=2] [ref=e654]
        - heading "2.1 国内首个商场实景暗光人像实验室" [level=3] [ref=e655]
        - paragraph [ref=e656]: 我们在15米挑高商场中庭搭建3米高、占地60㎡的"暗箱实验室"——这个体量在商场中庭足够醒目，又不会过度遮挡动线。
        - paragraph [ref=e657]:
          - strong [ref=e658]: 暗箱内部设置三个独立暗光场景区：
        - paragraph [ref=e659]: 场景区环境模拟核心体验城市夜景区霓虹灯下的街拍场景复杂光源下的人像表现星空人像区极暗环境下的星空人像极限暗光拍照能力光影人像区单一光源营造戏剧感专业光影人像效果
        - heading "2.2 \"Before-After\"对比出片机制" [level=3] [ref=e660]
        - paragraph [ref=e661]:
          - text: 每个暗光场景区安装投屏电视，用户拍摄后立即展示对比效果。现场用问界新机直出 vs 用户自己手机拍摄，现场投屏对比——
          - strong [ref=e662]: 用真实效果说服，而非用话术说服
          - text: 。
        - heading "2.3 专业人像摄影指导是核心差异点" [level=3] [ref=e663]
        - paragraph [ref=e664]: 每个区域安排专业人像摄影师+华为体验顾问，用户体验后现场导出发朋友圈。活动不设置网红来打卡，而是设置"出片引导员"——帮助用户找到最好的拍摄角度和光线。当场导出的高清照片+水印，用户自然愿意发朋友圈。
        - paragraph [ref=e665]: "---"
