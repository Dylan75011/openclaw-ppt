        - generic [ref=e94]: 我们这边最近要提一个线下活动方案，先不用太正式。大概是给一个手机新品做预热，领导想要年轻一点、能出片一点，但预算应该不会特别高。你先别急着写整套方案，先帮我想想方向。
        - generic [ref=e96]:
          - paragraph [ref=e97]: 好的，先聊方向。
          - paragraph [ref=e98]: 几个思路给你参考：
          - paragraph [ref=e99]:
            - strong [ref=e100]: 1. 快闪店 + 挑战打卡
            - text: <br />在城市年轻人口聚集的地方（比如三里屯、国贸、前滩太古里这种），弄一个为期3-5天的限时体验空间。设置几个能出片的互动装置（比如光影隧道、产品合影墙、AR打卡点），让用户拍照分享然后领小礼品。成本可控，核心吃传播。
          - paragraph [ref=e101]:
            - strong [ref=e102]: 2. 联名快闪咖啡车 / 气泡站
            - text: <br />现在年轻人对"喝一杯"打卡没什么抵抗力。搞个手机主题的移动咖啡车或者气泡水站，放个巨幅包装装置，往那儿一站就是朋友圈素材。场地灵活，成本比固定店低。
          - paragraph [ref=e103]:
            - strong [ref=e104]: 3. 校园 / 艺术区地下赛博风活动
            - text: <br />如果产品偏性能或游戏属性，可以考虑这种调性——暗黑系灯光、霓虹元素、投篮机或电竞挑战。场地选大学城或者创意园区，氛围感到位，拍照也出片。
          - paragraph [ref=e105]:
            - strong [ref=e106]: 4. 盒子盲盒装置
            - text: <br />堆一堆巨型产品盒子，做成可以打开的盲盒墙或者互动墙，年轻人就喜欢这种"拆"的仪式感。拍出来也有视觉冲击力。
          - paragraph [ref=e107]: "---"
          - paragraph [ref=e108]: 这几个方向你们倾向于哪个？或者你们产品有什么特别的卖点，我可以帮你往那个方向再收一收。
        - paragraph [ref=e111]: 这一轮信息我已经整理完了，你可以继续补充方向，我再往下推进。
        - generic [ref=e124]: 先别往校园和咖啡车那边走，感觉有点跑偏。我们大概率还是在商场中庭或者购物中心里做，品牌调性是国产中高端，卖点偏拍照，尤其是夜景和人像这块。还有一个点，领导会怕太像纯网红打卡，所以最好还是能看起来有产品体验逻辑。你帮我收两个更稳一点的方向。
        - generic [ref=e137]:
          - paragraph [ref=e138]: 明白了，再收两个：
          - paragraph [ref=e139]:
            - strong [ref=e140]: 1. 暗光摄影实验室
            - text: <br />围绕夜景和人像的核心卖点，做一个"黑空间"——模拟夜晚城市街头、霓虹灯箱、弱光人像等场景，参观者现场用手机拍，现场对比效果。视觉上偏专业摄影棚调性（深灰/黑色系），不是那种花里胡哨的网红风，但拍照确实出片。逻辑很顺：让你亲身试验我们的夜景/人像到底强在哪。
          - paragraph [ref=e141]:
            - strong [ref=e142]: 2. 人像写真体验区
            - text: <br />搭几个不同风格的人像场景（极简肖像、复古胶片感、艺术光影），强调"用手机也能拍出写真级人像"。可以设置现场打印照片的环节，增加一点"带走实物"的仪式感。比纯打卡更有体验内容，同时出片效果一点不差。
          - paragraph [ref=e143]: "---"
          - paragraph [ref=e144]: 这两个哪个更贴合你们想法？或者你们倾向于把两个揉在一起也行。
